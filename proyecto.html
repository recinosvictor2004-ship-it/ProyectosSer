<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plan Financiero de Mejora</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            font-size: 40px;
            font-weight: bold;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
        }

        nav button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.25);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        nav button:hover {
            background: rgba(255,255,255,0.45);
            transform: translateY(-3px);
        }

        .wave {
            position: absolute;
            width: 140%;
            height: 300px;
            left: -20%;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .w1 { top: 0; }
        .w2 { top: 350px; background: rgba(255,255,255,0.10); }
        .w3 { top: 700px; background: rgba(255,255,255,0.18); }

        .pantalla {
            display: none;
            padding: 50px;
            animation: fade 0.4s ease-in-out;
        }

        .activa {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            max-width: 750px;
            margin: auto;
            padding: 40px;
            background: rgba(255,255,255,0.12);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }

        h2 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            background: rgba(255,255,255,0.85);
            color: #333;
        }

        .btn-accion {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #ff4f9a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        .btn-accion:hover {
            background: #ff2d85;
            transform: translateY(-3px);
        }

        table {
            width: 100%;
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            border-radius: 12px;
            color: #333;
            overflow: hidden;
        }

        table th, table td {
            padding: 12px;
            text-align: center;
        }

        table th {
            background: #eee;
        }

        #historial p {
            background: rgba(255,255,255,0.9);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            color: #333;
        }

    </style>
</head>

<body>

<header>✨ Plan Financiero de Mejora</header>

<div class="wave w1"></div>
<div class="wave w2"></div>
<div class="wave w3"></div>

<nav>
    <button onclick="mostrar('inicio')">Inicio</button>
    <button onclick="mostrar('simulador')">Simulador</button>
    <button onclick="mostrar('bitacora')">Bitácora</button>
</nav>

<div id="inicio" class="pantalla activa">
    <div class="card">
        <h2>Bienvenido 👋</h2>
        <p>Explora este prototipo moderno inspirado en diseños premium.</p>
        <p>Incluye un simulador de ahorro mensual y una bitácora emocional financiera.</p>
    </div>
</div>

<div id="simulador" class="pantalla">
    <div class="card">
        <h2>Simulador de Ahorro Mensual 💰</h2>

        <label>Monto total que deseas ahorrar:</label>
        <input type="number" id="total" placeholder="Ej: 3000">

        <label>Tiempo en meses:</label>
        <input type="number" id="meses" placeholder="Ej: 6">

        <button class="btn-accion" onclick="generarPlan()">Generar Plan Mensual</button>

        <div id="resultado"></div>
    </div>
</div>

<div id="bitacora" class="pantalla">
    <div class="card">
        <h2>Bitácora Emocional ✍️</h2>

        <textarea id="textoBitacora" rows="5" placeholder="Escribe tus emociones o reflexiones..."></textarea>

        <button class="btn-accion" onclick="guardarBitacora()">Guardar Reflexión</button>

        <h3>Historial:</h3>
        <div id="historial"></div>
    </div>
</div>

<script>
    function mostrar(pantalla) {
        document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
        document.getElementById(pantalla).classList.add('activa');
    }

    function generarPlan() {
        let total = document.getElementById("total").value;
        let meses = document.getElementById("meses").value;

        if (!total || !meses) {
            document.getElementById("resultado").innerHTML = "<p>Completa ambos campos.</p>";
            return;
        }

        let mensual = (total / meses).toFixed(2);

        let tabla = `
            <h3>Plan de Ahorro Mensual</h3>
            <p>Debes ahorrar <b>Q${mensual}</b> cada mes.</p>
            <table>
                <tr><th>Mes</th><th>Ahorro</th></tr>
        `;

        for (let i = 1; i <= meses; i++) {
            tabla += `<tr><td>${i}</td><td>Q${mensual}</td></tr>`;
        }

        tabla += "</table>";

        document.getElementById("resultado").innerHTML = tabla;
    }

    function guardarBitacora() {
        let texto = document.getElementById("textoBitacora").value;
        if (texto.trim() === "") return;

        let historial = document.getElementById("historial");
        let entrada = document.createElement("p");
        entrada.textContent = texto;
        historial.appendChild(entrada);

        document.getElementById("textoBitacora").value = "";
    }
</script>

</body>
</html>
